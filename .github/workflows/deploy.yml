name: Deploy DAGs to homelab

on:
  push:
    branches:
      - master
    paths:
      - 'airflow/dags/**'
  workflow_dispatch:

jobs:
  ci:
    name: Validate DAGs
    runs-on: self-hosted

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4 
      
      - name: Install dependencies
        run: |
          python3 -m venv /home/martin/docker/actions-runner/venv
          source /home/martin/docker/actions-runner/venv/bin/activate
          pip install flake8 apache-airflow

      - name: Lint
        run: |
          source /home/martin/docker/actions-runner/venv/bin/activate
          flake8 airflow/dags/ --max-line-length=120

      - name: Validate DAG imports
        run: |
          source /home/martin/docker/actions-runner/venv/bin/activate
          python3 -c "
          import sys
          sys.path.insert(0, 'airflow/dags')
          import football_pipeline_dag
          print('DAG importado correctamente')
          "
  
  cd:
    name: Deploy DAGs
    runs-on: self-hosted
    needs: ci

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Copy DAGs to airflow
        run: |
          cp airflow/dags/*.py /home/martin/docker/airflow/dags/
          echo "DAGs desplegados en $(date)"
      